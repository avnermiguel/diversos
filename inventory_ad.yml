---
plugin: microsoft.ad.ad
domain_server: 10.0.0.4

# O AWX continuará injetando as variáveis da sua Credencial Customizada
domain_username: "{{ lookup('env', 'AD_USER') }}@local.info"
domain_password: "{{ lookup('env', 'AD_PASSWORD') }}"

# Ignoramos a validação porque é o certificado do lab
validate_certs: false

# O Compose serve para criarmos aquelas variáveis de WinRM e atrelarmos aos hosts que forem encontrados
compose:
  ansible_connection: "'winrm'"
  ansible_port: 5985
  ansible_winrm_transport: "'ntlm'"
  ansible_winrm_server_cert_validation: "'ignore'"
