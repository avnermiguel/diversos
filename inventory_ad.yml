---
plugin: microsoft.ad.ldap
server: 10.0.0.4
realm: LOCAL.INFO
include_computers: true

# Injeção das credenciais via variáveis de ambiente do AWX
username: "{{ lookup('env', 'AD_USER') }}"
password: "{{ lookup('env', 'AD_PASS') }}"

hostvar_expressions:
  ansible_host: dNSHostName

group_vars:
  all:
    ansible_connection: winrm
    ansible_port: 5985
    ansible_winrm_transport: ntlm
    ansible_winrm_server_cert_validation: ignore
