---
- name: Distribuição de Software Base via Chocolatey
  hosts: all
  gather_facts: false
  
  # Força a elevação usando a mesma credencial do WinRM
  become: true
  become_method: runas
  become_user: "{{ ansible_user }}"
  
  vars:
    # Pega a senha da Machine Credential do AWX dinamicamente
    ansible_become_password: "{{ ansible_password }}"

  tasks:
    - name: Garantir que o Chocolatey esta instalado no host
      ansible.windows.win_shell: |
        Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
      args:
        creates: C:\ProgramData\chocolatey\bin\choco.exe

    - name: Instalar utilitarios essenciais de operacoes
      chocolatey.chocolatey.win_chocolatey:
        name:
          - 7zip
          - notepadplusplus
          - sysinternals
        state: present
