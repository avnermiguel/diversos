---
- name: Distribuição de Software Base via Chocolatey
  hosts: all
  gather_facts: false
  
  become: true
  become_method: runas
  become_user: SYSTEM

  tasks:
    - name: Garantir que o diretorio temporario existe
      ansible.windows.win_file:
        path: C:\Temp
        state: directory

    - name: Fazer o download do script do Chocolatey (Teste de Rede)
      ansible.windows.win_get_url:
        url: 'https://community.chocolatey.org/install.ps1'
        dest: C:\Temp\install_choco.ps1
      args:
        creates: C:\ProgramData\chocolatey\bin\choco.exe

    - name: Executar a instalacao do Chocolatey localmente (Teste de Permissao)
      ansible.windows.win_command: powershell.exe -NoProfile -ExecutionPolicy Bypass -File C:\Temp\install_choco.ps1
      args:
        creates: C:\ProgramData\chocolatey\bin\choco.exe

    - name: Instalar utilitarios essenciais de operacoes
      chocolatey.chocolatey.win_chocolatey:
        name:
          - 7zip
          - notepadplusplus
          - sysinternals
        state: present
